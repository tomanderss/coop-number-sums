name: Android Build

# Manuell ausgelöst (kein Auto-Trigger auf jeden Push) — macOS/Android-Runner
# sind unnötig hier, aber wir wollen das Gradle-Build nicht bei jedem Commit
# laufen lassen, nur wenn ein Test-APK gebraucht wird.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run cap:sync

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Debug-APK ist mit Androids eingebautem Debug-Key signiert (kein
      # eigener Keystore nötig) — installierbar auf jedem Gerät mit aktivierter
      # "Unbekannte Quellen"-Option, aber nicht Play-Store-fähig.
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Signierter Release-Build (App Bundle) läuft nur, wenn die nötigen
      # Secrets hinterlegt sind (siehe README, Abschnitt "Native Apps") —
      # noch nicht der Fall, da bisher kein Android-Upload-Keystore existiert.
      - name: Build signed release bundle
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
