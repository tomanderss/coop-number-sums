<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coop Number Sums" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Coop Number Sums — Logikrätsel solo oder im Coop-Modus" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>Coop Number Sums</title>
  <style>
    #splash {
      position: fixed; inset: 0; background: #0b1020;
      display: flex; align-items: center; justify-content: center; z-index: 99997;
      transition: opacity .45s ease; padding-top: env(safe-area-inset-top, 0px);
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-inner { text-align: center; }
    #splash-logo {
      width: 104px; height: 104px; border-radius: 26px; margin: 0 auto;
      display: block; box-shadow: 0 0 48px rgba(91,140,255,.45);
    }
    #splash-title { font-family: system-ui, sans-serif; font-size: 1.4rem; font-weight: 900; color: #e8edf7; margin-top: 18px; letter-spacing: -.3px; }
    #splash-sub { font-family: system-ui, sans-serif; font-size: .8rem; color: #5d6987; margin-top: 4px; }
    #splash-version { font-family: system-ui, sans-serif; font-size: .72rem; color: #3a4564; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="rotate-fix">
    <div id="splash">
      <div id="splash-inner">
        <img id="splash-logo" src="./icons/icon-192.png" alt="" />
        <div id="splash-title">Coop Number Sums</div>
        <div id="splash-version"></div>
      </div>
    </div>
    <div id="app"></div>
    <div id="err" style="display:none;position:fixed;inset:0;background:#1a0000;color:#ff6b6b;padding:20px;font-family:monospace;font-size:13px;z-index:99999;overflow:auto;white-space:pre-wrap"></div>
  </div>
  <script>
    // Best-effort echte OS-Sperre (wirkt nur im Standalone/Fullscreen-Kontext
    // auf unterstützten Browsern, z.B. installierte PWA unter Android-Chrome).
    // Schlägt überall sonst (iOS, normaler Browser-Tab) lautlos fehl — dafür
    // sorgt der CSS-Rotations-Fallback in styles.css für den Hochformat-Zwang.
    try { screen.orientation && screen.orientation.lock('portrait').catch(function(){}); } catch (e) {}
    // Klassisches Script (kein type="module") — kann debuglog.js nicht importieren.
    // Schreibt deshalb direkt im selben Format/Key wie debuglog.js, damit ein
    // späterer exportLogToFile()-Aufruf auch Boot-Fehler und globale Laufzeitfehler
    // enthält.
    function cnsLogWindowError(message, extra) {
      try {
        var key = 'cns_debuglog';
        var entries = JSON.parse(localStorage.getItem(key)) || [];
        entries.push({ ts: Date.now(), category: 'window', message: message, extra: extra });
        while (entries.length > 400) entries.shift();
        localStorage.setItem(key, JSON.stringify(entries));
      } catch (e) {}
    }
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('err');
      d.style.display = 'block';
      d.textContent = 'ERROR:\n' + msg + '\n\nFile: ' + src + '\nLine: ' + line + '\n\n' + (err && err.stack ? err.stack : '');
      cnsLogWindowError(msg + ' (' + src + ':' + line + ')', err ? { message: err.message, name: err.name } : undefined);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('err');
      d.style.display = 'block';
      d.textContent += '\nPromise Error:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      cnsLogWindowError('Promise Error: ' + String(e.reason), e.reason ? { message: e.reason.message, name: e.reason.name } : undefined);
    });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
